{% extends 'base.html' %}
{% block title %}Confirm delete{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body text-center p-5">
                    <div class="display-2 text-danger mb-3"><i class="bi bi-exclamation-triangle-fill"></i></div>
                    <h4 class="fw-bold">Delete this {{ title }}?</h4>
                    <p class="text-muted">You are about to permanently delete <b>{{ object }}</b>. This action cannot be undone.</p>
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <a href="{{ back_url }}" class="btn btn-light me-2">Cancel</a>
                        <button class="btn btn-danger" type="submit">
                            <i class="bi bi-trash"></i> Yes, delete it
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
